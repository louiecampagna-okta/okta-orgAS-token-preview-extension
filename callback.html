<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Okta Token Preview</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #7e8aaa;
      font-size: 14px;
    }
    .wrap { text-align: center; }
    .icon {
      width: 48px; height: 48px;
      background: #007dc1; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .msg { color: #e8ecf4; font-weight: 600; margin-bottom: 8px; }
    .sub { font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>
    <div class="msg">Completing authentication…</div>
    <div class="sub">This tab will close automatically.</div>
  </div>
  <script src="callback.js"></script>
</body>
</html>
